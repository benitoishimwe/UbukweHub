spring:
  application:
    name: prani-backend

  datasource:
    url: jdbc:postgresql://aws-1-eu-west-3.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
    username: postgres.ywkbpoqutmkqhajbzugy
    password: Trillionaire@2001
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # CRITICAL: never auto-create/drop — existing Supabase schema must be preserved
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: false
        jdbc:
          time_zone: UTC
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    # Only runs new migrations for new Prani tables — existing tables untouched
    table: prani_schema_history

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

prani:
  jwt:
    # Must match the Python backend secret exactly for token compatibility
    secret: ${JWT_SECRET_KEY:ubukwe-hub-secret-key-2025-rwanda-weddings}
    expiration-hours: 168

  claude:
    api-key: ${ANTHROPIC_API_KEY:not-configured}
    model: claude-sonnet-4-6
    base-url: https://api.anthropic.com
    api-version: '2023-06-01'

  openai:
    api-key: ${OPENAI_API_KEY:not-configured}
    image-model: dall-e-3
    base-url: https://api.openai.com

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:not-configured}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:not-configured}
    price-ids:
      pro-monthly: ${STRIPE_PRICE_PRO_MONTHLY:price_placeholder}
      pro-yearly: ${STRIPE_PRICE_PRO_YEARLY:price_placeholder}
      enterprise-monthly: ${STRIPE_PRICE_ENTERPRISE_MONTHLY:price_placeholder}
      enterprise-yearly: ${STRIPE_PRICE_ENTERPRISE_YEARLY:price_placeholder}

  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY:}
    base-url: https://api.paystack.co

  resend:
    api-key: ${RESEND_API_KEY:not-configured}
    from-email: ${RESEND_FROM_EMAIL:noreply@prani.app}
    from-name: Prani

  cors:
    allowed-origins: ${CORS_ORIGINS:*}

  public-dir: ${PUBLIC_DIR:./public}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.prani: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

logging:
  level:
    com.prani: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 20
